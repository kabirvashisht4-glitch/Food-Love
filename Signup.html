<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Food Love</title>
    <link rel="stylesheet" href="style.css"/>
    <style>
        body {
            background-color: white;
            color: black;
            transition: 0.3s;
        }
        .dark-mode {
            background-color: black;
            color: white;
        }
  </style>
</head>
<body>
    <header class="header">
        <div class="logo">Food Love</div>
        <nav class="nav">
            <button id="btn">Dark Mode</button>
            <script>
                    let button = document.getElementById("btn");
                    button.addEventListener("click", function () {
                        document.body.classList.toggle("dark-mode");
                    });
            </script>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>
    <section class="auth-page">
        <div class="auth-card">
            <h2>Create Your Account</h2>
            <form class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label> 
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Choose Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <script>
                let form = document.querySelector(".auth-form");
                let nameInput = document.getElementById("name");
                form.onsubmit = function (event) {
                    event.preventDefault();
                    let userName = nameInput.value;
                    document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>Welcome " + userName + "!</h1>";
                };
            </script>
            <p class="switch-link">
                Already have an account? 
            </p>
        </div>
    </section>
    <footer class="footer">© 2025 Food Love</footer>
</body>
</html>
