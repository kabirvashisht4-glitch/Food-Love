<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Food Love</title>
    <link rel="stylesheet" href="style.css"/>
    <style> /
        body {
        background-color: white;
        color: black;
        transition: 0.3s;
        }

        .dark-mode {
        background-color: black;
        color: white;
        }
  </style>
</head>
<body>
    <header class="header">
        <div class="logo">Food Love</div>
        <nav class="nav">
            <button id="btn">Dark Mode</button>
            <script>
                    let button = document.getElementById("btn");
                    button.onclick = function () {
                        document.body.classList.toggle("dark-mode");
                    };
            </script>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="signup.html" class="auth-link btn">Sign Up</a>
        </nav>
    </header>
    <div style="display: flex; justify-content: center;">
        <section class="contact-section" style="height: 500px; width: 500px;">
            <h2>Get In Touch</h2>
            <p>We'd love to hear your feedback or answer any questions!</p>

            <form class="contact-form">
                <div class="form-group">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Your Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Message:</label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </div>
    <footer class="footer">© 2025 Food Love</footer>
</body>
</html>
